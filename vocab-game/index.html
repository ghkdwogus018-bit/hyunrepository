<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6c5ce7" />
<title>단어팡 · 심슨보카 하루 복습</title>

<style>
  :root {
    --bg1: #eef1ff;
    --bg2: #f7f0ff;
    --card: #ffffff;
    --ink: #26264f;
    --ink-soft: #6b6b8d;
    --line: #ececf6;
    --brand: #6c5ce7;
    --brand-d: #5a4bd4;
    --good: #18b980;
    --good-bg: #e5f9f1;
    --bad: #ff6b81;
    --bad-bg: #ffecef;
    --gold: #ffb020;
    --shadow: 0 10px 30px rgba(60, 50, 120, .12);
    --shadow-sm: 0 4px 14px rgba(60, 50, 120, .10);
    --r-lg: 26px;
    --r-md: 18px;
    --r-sm: 14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
      'Noto Sans KR', 'Malgun Gothic', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 700px at 80% -10%, #dfe4ff 0%, transparent 60%),
      radial-gradient(1000px 600px at -10% 110%, #ffe4f4 0%, transparent 55%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }

  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100%;
    padding: 18px 16px calc(28px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
  }

  .screen { animation: fade .35s ease both; flex: 1; display: flex; flex-direction: column; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 16px;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 19px; letter-spacing: -.3px; }
  .brand .logo {
    width: 34px; height: 34px; border-radius: 11px;
    background: linear-gradient(145deg, var(--brand), #8a7bff);
    display: grid; place-items: center; font-size: 19px;
    box-shadow: 0 6px 14px rgba(108, 92, 231, .35);
  }
  .chips { display: flex; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--card); border: 1px solid var(--line);
    padding: 7px 11px; border-radius: 999px; font-weight: 700; font-size: 13px;
    box-shadow: var(--shadow-sm);
  }
  .chip.fire { color: #e5622b; }
  .chip.xp { color: var(--brand); }

  /* ---------- Home ---------- */
  .hero {
    background: linear-gradient(150deg, #6c5ce7, #8b7bff 55%, #b39dff);
    color: #fff; border-radius: var(--r-lg); padding: 22px 20px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .hero::after {
    content: ""; position: absolute; right: -30px; top: -30px;
    width: 150px; height: 150px; border-radius: 50%;
    background: rgba(255,255,255,.14);
  }
  .hero h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -.4px; }
  .hero p { margin: 0; opacity: .9; font-size: 14px; }
  .level-row { display: flex; align-items: center; gap: 10px; margin-top: 16px; }
  .level-badge {
    background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
    padding: 4px 10px; border-radius: 999px; font-weight: 800; font-size: 13px; white-space: nowrap;
  }
  .xpbar { flex: 1; height: 10px; background: rgba(255,255,255,.25); border-radius: 999px; overflow: hidden; }
  .xpbar > span { display: block; height: 100%; background: #ffd84d; border-radius: 999px; transition: width .6s cubic-bezier(.2,.8,.2,1); }
  .xp-caption { font-size: 12px; opacity: .9; margin-top: 6px; }

  .section-title {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 22px 4px 12px; font-weight: 800; font-size: 16px;
  }
  .section-title small { font-weight: 600; color: var(--ink-soft); font-size: 12px; }

  /* Continue card */
  .continue {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 16px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-sm);
    cursor: pointer; transition: transform .12s;
  }
  .continue:active { transform: scale(.98); }
  .continue .emoji { font-size: 30px; }
  .continue .txt { flex: 1; }
  .continue .txt b { display: block; font-size: 15px; }
  .continue .txt span { font-size: 13px; color: var(--ink-soft); }
  .continue .go { color: var(--brand); font-weight: 800; font-size: 22px; }

  /* Day grid */
  .grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 9px;
  }
  .day {
    position: relative; aspect-ratio: 1 / 1; border-radius: var(--r-sm);
    background: var(--card); border: 1.5px solid var(--line);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; cursor: pointer; box-shadow: var(--shadow-sm);
    transition: transform .12s, border-color .12s;
    color: var(--ink);
  }
  .day small { font-size: 10px; font-weight: 700; color: var(--ink-soft); }
  .day:active { transform: scale(.94); }
  .day.done { border-color: var(--good); background: var(--good-bg); color: #0f7a55; }
  .day.done small { color: #23a97d; }
  .day .star { position: absolute; top: 5px; right: 6px; font-size: 11px; }
  .day .rev-dot {
    position: absolute; bottom: 6px; width: 6px; height: 6px; border-radius: 50%;
    background: var(--bad);
  }

  /* ---------- Setup sheet ---------- */
  .setup { background: var(--card); border-radius: var(--r-lg); padding: 22px; box-shadow: var(--shadow); }
  .setup h2 { margin: 0 0 2px; font-size: 20px; }
  .setup .sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 18px; }
  .opt-label { font-weight: 700; font-size: 13px; color: var(--ink-soft); margin: 14px 2px 8px; }
  .segment { display: flex; gap: 8px; }
  .segment button {
    flex: 1; padding: 12px 0; border-radius: var(--r-sm); border: 1.5px solid var(--line);
    background: #fbfbff; font-weight: 800; font-size: 15px; color: var(--ink); cursor: pointer;
    transition: .12s;
  }
  .segment button.on { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 6px 14px rgba(108,92,231,.3); }
  .segment button:active { transform: scale(.96); }

  /* ---------- Buttons ---------- */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 16px; border-radius: var(--r-md); border: none;
    font-weight: 800; font-size: 16px; cursor: pointer; transition: transform .12s, box-shadow .2s;
    font-family: inherit;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: linear-gradient(145deg, var(--brand), #8b7bff); color: #fff; box-shadow: 0 10px 22px rgba(108,92,231,.35); }
  .btn-primary:hover { background: var(--brand-d); }
  .btn-ghost { background: var(--card); color: var(--ink); border: 1.5px solid var(--line); box-shadow: var(--shadow-sm); }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-row .btn { margin-top: 0; }

  .link { background: none; border: none; color: var(--ink-soft); font-size: 14px; font-weight: 700; cursor: pointer; padding: 8px; font-family: inherit; }

  /* ---------- Quiz ---------- */
  .quiz-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .iconbtn {
    width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); font-size: 17px; cursor: pointer; box-shadow: var(--shadow-sm);
    display: grid; place-items: center; flex: none;
  }
  .progress-wrap { flex: 1; }
  .progress-top { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: var(--ink-soft); margin-bottom: 5px; }
  .pbar { height: 12px; background: #e6e6f4; border-radius: 999px; overflow: hidden; }
  .pbar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--brand), #9b8bff); border-radius: 999px; transition: width .4s cubic-bezier(.2,.8,.2,1); }

  .combo {
    text-align: center; height: 22px; font-weight: 800; font-size: 14px; color: var(--gold);
    opacity: 0; transition: opacity .2s;
  }
  .combo.show { opacity: 1; animation: pop .4s; }
  @keyframes pop { 0%{ transform: scale(.6);} 60%{ transform: scale(1.15);} 100%{ transform: scale(1);} }

  .wordcard {
    background: var(--card); border-radius: var(--r-lg); box-shadow: var(--shadow);
    padding: 30px 22px; text-align: center; margin: 8px 0 16px; position: relative;
    border: 1px solid var(--line);
  }
  .wordcard .kicker { font-size: 12px; font-weight: 700; color: var(--ink-soft); letter-spacing: .3px; }
  .wordcard .word {
    font-size: 40px; font-weight: 800; letter-spacing: -.5px; margin: 8px 0 4px; word-break: break-word;
    line-height: 1.15;
  }
  .wordcard .pos { display: inline-block; font-size: 13px; font-weight: 700; color: var(--brand);
    background: #efeaff; padding: 3px 12px; border-radius: 999px; }
  .wordcard.correct { animation: nod .5s; border-color: var(--good); }
  .wordcard.wrong { animation: shake .45s; border-color: var(--bad); }
  @keyframes nod { 0%,100%{ transform: none;} 30%{ transform: translateY(-6px);} 60%{ transform: translateY(0);} }
  @keyframes shake { 0%,100%{ transform: translateX(0);} 20%{ transform: translateX(-9px);} 40%{ transform: translateX(8px);} 60%{ transform: translateX(-6px);} 80%{ transform: translateX(4px);} }

  .mascot {
    position: absolute; top: -20px; right: 14px; font-size: 30px;
    transition: transform .25s; filter: drop-shadow(0 4px 6px rgba(0,0,0,.12));
  }
  .mascot.happy { animation: bounce .6s; }
  @keyframes bounce { 0%,100%{ transform: translateY(0) rotate(0);} 40%{ transform: translateY(-14px) rotate(-8deg);} 70%{ transform: translateY(0) rotate(6deg);} }

  .choices { display: grid; gap: 10px; }
  .choice {
    display: flex; align-items: center; gap: 12px; text-align: left; width: 100%;
    background: var(--card); border: 2px solid var(--line); border-radius: var(--r-md);
    padding: 14px 16px; font-size: 15.5px; font-weight: 600; color: var(--ink);
    cursor: pointer; box-shadow: var(--shadow-sm); transition: transform .1s, border-color .15s, background .15s;
    font-family: inherit; min-height: 58px;
  }
  .choice:active { transform: scale(.985); }
  .choice .num {
    flex: none; width: 27px; height: 27px; border-radius: 9px; background: #f0f0fa;
    display: grid; place-items: center; font-weight: 800; font-size: 14px; color: var(--brand);
    transition: .15s;
  }
  .choice .label { flex: 1; line-height: 1.35; }
  .choice.correct { border-color: var(--good); background: var(--good-bg); color: #0d6b4a; }
  .choice.correct .num { background: var(--good); color: #fff; }
  .choice.wrong { border-color: var(--bad); background: var(--bad-bg); color: #b0294a; }
  .choice.wrong .num { background: var(--bad); color: #fff; }
  .choice.dim { opacity: .5; }
  .choice[disabled] { cursor: default; }

  .next-bar { margin-top: 14px; min-height: 56px; }
  .review-hint {
    background: var(--bad-bg); color: #b0294a; border-radius: var(--r-sm); padding: 10px 14px;
    font-size: 13px; font-weight: 700; margin-bottom: 10px; text-align: center;
    animation: fade .3s;
  }

  /* ---------- Result ---------- */
  .result-hero {
    text-align: center; background: var(--card); border-radius: var(--r-lg);
    padding: 26px 20px; box-shadow: var(--shadow); border: 1px solid var(--line);
  }
  .result-hero .big-emoji { font-size: 60px; animation: bounce .8s; }
  .result-hero h2 { margin: 8px 0 2px; font-size: 24px; }
  .result-hero .grade { color: var(--ink-soft); font-size: 14px; }
  .score-ring { font-size: 46px; font-weight: 800; margin: 12px 0 2px; letter-spacing: -1px; }
  .score-ring span { font-size: 20px; color: var(--ink-soft); }
  .stat-row { display: flex; gap: 10px; margin-top: 16px; }
  .stat {
    flex: 1; background: #f8f8ff; border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 12px 8px; text-align: center;
  }
  .stat b { display: block; font-size: 19px; }
  .stat small { color: var(--ink-soft); font-size: 11px; font-weight: 700; }

  .review-list { margin-top: 18px; }
  .review-list h3 { font-size: 15px; margin: 0 0 10px 2px; display: flex; align-items: center; gap: 6px; }
  .rv-item {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 13px 15px; margin-bottom: 8px; box-shadow: var(--shadow-sm);
  }
  .rv-item .rv-word { font-weight: 800; font-size: 16px; }
  .rv-item .rv-word .pos { font-size: 12px; color: var(--brand); margin-left: 7px; font-weight: 700; }
  .rv-item .rv-mean { font-size: 13.5px; color: var(--ink-soft); margin-top: 3px; }

  .footer-note { text-align: center; color: var(--ink-soft); font-size: 12px; margin-top: 22px; line-height: 1.6; }

  /* confetti layer */
  #fx { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
  .confetti { position: absolute; width: 10px; height: 14px; will-change: transform, opacity; }
  .floatword { position: fixed; z-index: 60; font-weight: 800; pointer-events: none; animation: floatup 1s ease-out forwards; }
  @keyframes floatup { 0%{ opacity: 0; transform: translateY(0) scale(.8);} 20%{ opacity: 1;} 100%{ opacity: 0; transform: translateY(-70px) scale(1.2);} }

  .hidden { display: none !important; }
</style>

<div id="app"></div>
<div id="fx"></div>

<script src="data.js"></script>
<script src="app.js"></script>
