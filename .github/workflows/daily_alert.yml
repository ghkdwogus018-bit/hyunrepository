name: ISA ETF 일일 알림 (매일 오전 8시 KST)

on:
  # KST 08:00 = UTC 23:00 (전날)
  schedule:
    - cron: "0 23 * * *"
  # 수동 실행 버튼
  workflow_dispatch:

jobs:
  send-etf-alert:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: ISA ETF 분석 및 카카오톡 전송
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          TOP_N_ETF: "10"
        run: python main.py
