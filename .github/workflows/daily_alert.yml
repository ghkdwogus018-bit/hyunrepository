name: ISA ETF 일일 알림 (매일 오전 8시 KST)

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  send-etf-alert:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: ISA ETF 분석 및 텔레그램 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOP_N_ETF: "10"
        run: python main.py
